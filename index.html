<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predict.ly | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; }
        .glass-panel { 
            background: rgba(30, 41, 59, 0.5); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }
    </style>
</head>
<body class="p-8">

    <!-- Header -->
    <header class="flex justify-between items-center mb-10">
        <h1 class="text-3xl font-bold text-white tracking-tight">Predict.ly</h1>
        <button class="bg-indigo-600 hover:bg-indigo-700 px-6 py-2 rounded-full font-medium transition">Connect Wallet</button>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <!-- Markets Section -->
        <div class="lg:col-span-2">
            <h2 class="text-2xl font-semibold mb-6">Featured Predictions</h2>
            <div id="marketContainer" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- Markets will be injected here -->
            </div>
        </div>

        <!-- Sidebar -->
        <div class="space-y-6">
            <div class="glass-panel p-6 rounded-3xl border border-slate-700">
                <h2 class="font-bold text-lg mb-4">Place Bet</h2>
                <input id="marketId" type="number" placeholder="Market ID" class="w-full p-3 bg-slate-900 rounded-xl mb-4 border border-slate-700 focus:outline-none focus:border-indigo-500">
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="placeBet(true)" class="bg-emerald-600 hover:bg-emerald-500 py-3 rounded-xl font-bold transition">YES</button>
                    <button onclick="placeBet(false)" class="bg-rose-600 hover:bg-rose-500 py-3 rounded-xl font-bold transition">NO</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const markets = [
            { id: 1, title: "Will 'RED FORCE TV' surpass 1M views in 2024?" },
            { id: 2, title: "Which team wins the 'FIFA World Cup 2026'?" },
            { id: 3, title: "Global AI adoption rate by Q4 2025?" },
            { id: 4, title: "Next major crypto to hit $100K ATH?" }
        ];

        function loadMarkets() {
            const container = document.getElementById('marketContainer');
            container.innerHTML = markets.map(m => `
                <div class="glass-panel p-6 rounded-3xl border border-slate-700 hover:border-indigo-500 transition">
                    <h3 class="font-bold text-lg mb-4">${m.title}</h3>
                    <button onclick="selectMarket(${m.id})" class="bg-slate-800 hover:bg-slate-700 w-full py-2.5 rounded-xl font-semibold text-sm transition">
                        Select Market
                    </button>
                </div>
            `).join('');
        }

        function selectMarket(id) {
            document.getElementById('marketId').value = id;
        }

        function placeBet(isYes) {
            const id = document.getElementById('marketId').value;
            if(!id) return alert("Select a market first!");
            alert("Placing " + (isYes ? "YES" : "NO") + " bet on Market #" + id);
        }

        window.onload = loadMarkets;
    </script>
</body>
</html>
