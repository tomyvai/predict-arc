<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predict.arc | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>
    <style>
        body { background: radial-gradient(circle at top right, #1e293b, #0f172a); color: #f8fafc; min-height: 100vh; }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
    </style>
</head>
<body class="p-8">
    <header class="max-w-4xl mx-auto flex justify-between items-center mb-10">
        <h1 class="text-3xl font-bold">Predict.arc</h1>
        <button id="connectBtn" onclick="connectWallet()" class="bg-indigo-600 px-6 py-2 rounded-full">Connect Wallet</button>
    </header>

    <main class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8">
        <!-- Place Bet -->
        <div class="glass-panel p-6 rounded-3xl">
            <h2 class="font-bold text-xl mb-4">Place Bet</h2>
            <input id="marketId" type="number" placeholder="Market ID" class="w-full p-3 bg-slate-950 rounded-xl mb-3 border border-slate-700">
            <div class="grid grid-cols-2 gap-3">
                <button onclick="placeBet(true)" class="bg-emerald-600 py-3 rounded-xl font-bold">YES</button>
                <button onclick="placeBet(false)" class="bg-rose-600 py-3 rounded-xl font-bold">NO</button>
            </div>
        </div>

        <!-- Create Market -->
        <div class="glass-panel p-6 rounded-3xl">
            <h2 class="font-bold text-xl mb-4">Create Market</h2>
            <input id="newQuestion" type="text" placeholder="Question?" class="w-full p-3 bg-slate-950 rounded-xl mb-3 border border-slate-700">
            <button onclick="createMarket()" class="w-full bg-blue-600 py-3 rounded-xl font-bold">Create Market</button>
        </div>
    </main>

    <script>
        const contractAddress = "0xa144672B1DFc3348F0D938DE6496C031a5bcCA3D";
        const abi = [
            "function bet(uint256 _marketId, bool _prediction) public payable",
            "function createMarket(string memory _question) public"
        ];

        async function connectWallet() {
            await window.ethereum.request({ method: 'eth_requestAccounts' });
            document.getElementById('connectBtn').innerText = "Connected";
        }

        async function placeBet(isYes) {
            const id = document.getElementById('marketId').value;
            if(!id) return alert("Enter Market ID");
            
            const provider = new ethers.providers.Web3Provider(window.ethereum);
            const signer = provider.getSigner();
            const contract = new ethers.Contract(contractAddress, abi, signer);
            
            try {
                // এখানে Boolean(isYes) ব্যবহার করা জরুরি
                const tx = await contract.bet(parseInt(id), Boolean(isYes), {
                    value: ethers.utils.parseEther("0.001"), // ১০০০ গুই বা ০.০০১ এথ বেট ভ্যালু
                    gasLimit: 300000
                });
                alert("Transaction submitted!");
                await tx.wait();
                alert("Bet confirmed!");
            } catch(e) {
                console.error(e);
                alert("Error: " + (e.data?.message || e.message));
            }
        }

        async function createMarket() {
            const question = document.getElementById('newQuestion').value;
            const provider = new ethers.providers.Web3Provider(window.ethereum);
            const signer = provider.getSigner();
            const contract = new ethers.Contract(contractAddress, abi, signer);
            
            try {
                const tx = await contract.createMarket(question);
                await tx.wait();
                alert("Market created!");
            } catch(e) {
                alert("Error: " + e.message);
            }
        }
    </script>
</body>
</html>
</body>
</html>
