<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Arc | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass-card { 
            background: rgba(30, 41, 59, 0.7); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen p-8">

    <!-- Header -->
    <header class="flex justify-between items-center mb-10">
        <h1 class="text-3xl font-bold text-blue-400">Prediction Arc</h1>
        <button id="walletBtn" class="bg-blue-600 px-6 py-2 rounded-full hover:bg-blue-700 transition">Connect Wallet</button>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <!-- Market Section (Left) -->
        <div class="lg:col-span-2">
            <h2 class="text-xl font-bold mb-6">Active Markets</h2>
            <div id="marketList" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- Market cards will load here -->
            </div>
        </div>

        <!-- Sidebar (Right) -->
        <div class="space-y-6">
            <!-- Place Bet Section -->
            <div class="glass-card p-6 rounded-2xl">
                <h2 class="font-bold mb-4">Place Bet</h2>
                <input id="marketId" type="number" placeholder="Market ID" class="w-full p-3 bg-slate-900 rounded-lg mb-4 border border-slate-700">
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="placeBet(true)" class="bg-emerald-600 py-2 rounded-lg hover:bg-emerald-700 transition">YES</button>
                    <button onclick="placeBet(false)" class="bg-rose-600 py-2 rounded-lg hover:bg-rose-700 transition">NO</button>
                </div>
            </div>

            <!-- Transaction History Section -->
            <div class="glass-card p-6 rounded-2xl">
                <h2 class="font-bold mb-4">Transaction History</h2>
                <div id="history" class="text-sm text-slate-400 space-y-2">
                    <p>No recent activity.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Market data
        const markets = [
            { id: 1, title: "Will BTC hit $100k?" },
            { id: 2, title: "Is AI the future?" },
            { id: 3, title: "Gold prices up?" },
            { id: 4, title: "New Ethereum ATH?" }
        ];

        // Function to render markets
        function loadMarkets() {
            const list = document.getElementById('marketList');
            list.innerHTML = markets.map(m => `
                <div class="glass-card p-6 rounded-2xl border border-slate-700">
                    <h3 class="font-bold mb-4">ID #${m.id}: ${m.title}</h3>
                    <button onclick="selectMarket(${m.id})" class="w-full bg-slate-800 py-2 rounded-lg hover:bg-slate-700 transition">Select</button>
                </div>
            `).join('');
        }

        // Function to select market
        function selectMarket(id) {
            document.getElementById('marketId').value = id;
        }

        // Function to place bet
        function placeBet(isYes) {
            const id = document.getElementById('marketId').value;
            if (!id) return alert("Please select a market first!");
            alert("Bet placed on ID " + id + ": " + (isYes ? 'YES' : 'NO'));
        }

        // Wallet connect button action
        document.getElementById('walletBtn').onclick = () => alert("Connecting Wallet...");
        
        // Load markets on page load
        window.onload = loadMarkets;
    </script>
</body>
</html>
