<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Predict Arc</title>
    <!-- লাইব্রেরি লোড -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        :root { --bg: #0d1117; --card-bg: #161b22; --accent: #58a6ff; }
        body { background: var(--bg); color: #c9d1d9; font-family: sans-serif; margin: 0; display: flex; }
        .sidebar { width: 260px; height: 100vh; background: #010409; border-right: 1px solid #30363d; padding: 20px; }
        .main { flex: 1; padding: 40px; }
        .market-card { background: var(--card-bg); border: 1px solid #30363d; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .btn-yes { background: #238636; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; }
        .btn-no { background: #da3633; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="color: var(--accent);">Predict Arc</h2>
</div>

<div class="main">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h1>Active Markets</h1>
        <button id="connectBtn" onclick="connectWallet()" style="padding:10px 20px; cursor:pointer;">Connect Wallet</button>
    </div>

    <!-- মার্কেট কার্ডস -->
    <div class="market-card">
        <h3>Will ETH price go up today?</h3>
        <p>Market ID: 0</p>
        <button class="btn-yes" onclick="bet(0, true)">YES</button>
        <button class="btn-no" onclick="bet(0, false)">NO</button>
    </div>

    <div class="market-card">
        <h3>Will it rain in Dhaka tomorrow?</h3>
        <p>Market ID: 1</p>
        <button class="btn-yes" onclick="bet(1, true)">YES</button>
        <button class="btn-no" onclick="bet(1, false)">NO</button>
    </div>

    <div class="market-card">
        <h3>Will Bitcoin cross $70k this week?</h3>
        <p>Market ID: 2</p>
        <button class="btn-yes" onclick="bet(2, true)">YES</button>
        <button class="btn-no" onclick="bet(2, false)">NO</button>
    </div>

    <div class="market-card">
        <h3>Will the local team win the match?</h3>
        <p>Market ID: 3</p>
        <button class="btn-yes" onclick="bet(3, true)">YES</button>
        <button class="btn-no" onclick="bet(3, false)">NO</button>
    </div>
</div>

<script>
    const contractAddress = "0x459b226eE3192603260c9c94d78F5173BA040f2c";
    const abi = [{"inputs":[{"internalType":"uint256","name":"_marketId","type":"uint256"},{"internalType":"bool","name":"_prediction","type":"bool"}],"name":"bet","outputs":[],"stateMutability":"payable","type":"function"}];
    
    let signer;

    async function connectWallet() {
        if (typeof window.ethereum === 'undefined') {
            return alert("MetaMask is not installed!");
        }
        try {
            await window.ethereum.request({ method: 'eth_requestAccounts' });
            const provider = new ethers.providers.Web3Provider(window.ethereum);
            signer = provider.getSigner();
            document.getElementById("connectBtn").innerText = "Connected";
        } catch (e) {
            alert("Connection error: " + e.message);
        }
    }

    async function bet(id, pred) {
        if (!signer) {
            alert("Please connect wallet first!");
            return;
        }
        try {
            const contract = new ethers.Contract(contractAddress, abi, signer);
            // সরাসরি বাজি ধরার ফাংশন
            const tx = await contract.bet(id, pred, { value: ethers.utils.parseEther("0.001") });
            alert("Transaction sent! Wait for confirmation...");
            await tx.wait();
            alert("Bet Successful!");
        } catch (e) {
            console.error(e);
            alert("Bet failed: " + e.message);
        }
    }
</script>
</body>
</html>
</script>
</body>
</html>
