<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predict.arc | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>
    <style>
        body { background: radial-gradient(circle at top right, #1e293b, #0f172a); color: #f8fafc; font-family: 'Inter', sans-serif; min-height: 100vh; }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3); }
        button { transition: all 0.3s ease !important; }
        button:hover { transform: translateY(-2px); }
    </style>
</head>
<body class="p-8">

    <header class="flex justify-between items-center mb-10 max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold text-white tracking-tighter">Predict.arc</h1>
        <button id="connectWallet" onclick="connectWallet()" class="bg-indigo-600 hover:bg-indigo-700 px-6 py-2 rounded-full font-medium">Connect Wallet</button>
    </header>

    <main class="max-w-6xl mx-auto space-y-8">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2">
                <h2 class="text-2xl font-semibold mb-6">Featured Predictions</h2>
                <div id="marketContainer" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>

            <div class="lg:col-span-1">
                <div class="glass-panel p-6 rounded-3xl border border-slate-700">
                    <h2 class="font-bold text-xl mb-6">Place Bet</h2>
                    <input id="marketId" type="number" placeholder="Market ID" class="w-full p-4 bg-slate-950 rounded-2xl mb-4 border border-slate-700 focus:outline-none focus:border-indigo-500">
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="placeBet(true)" class="bg-emerald-600 hover:bg-emerald-500 py-4 rounded-2xl font-bold">YES</button>
                        <button onclick="placeBet(false)" class="bg-rose-600 hover:bg-rose-500 py-4 rounded-2xl font-bold">NO</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const contractAddress = "0xa144672B1DFc3348F0D938DE6496C031a5bcCA3D";
        
        const markets = [
            { id: 1, title: "Will Bitcoin hit $120,000 before the end of 2026?" },
            { id: 2, title: "Will Ethereum surpass $5,000 this year?" },
            { id: 3, title: "Argentina will win FIFA World Cup 2026?" },
            { id: 4, title: "Will Apple release a foldable iPhone before Q4 2026?" }
        ];

        async function connectWallet() {
            if (window.ethereum) {
                try {
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    document.getElementById('connectWallet').innerText = "Connected: " + accounts[0].substring(0, 6) + "...";
                } catch (error) { alert("User denied account access"); }
            } else { alert("Please install MetaMask!"); }
        }

        function loadMarkets() {
            const container = document.getElementById('marketContainer');
            container.innerHTML = markets.map(m => `
                <div class="glass-panel p-6 rounded-3xl border border-slate-700">
                    <span class="text-indigo-400 font-bold">ID: ${m.id}</span>
                    <h3 class="font-bold text-lg mb-6 mt-2">${m.title}</h3>
                    <button onclick="selectMarket(${m.id})" class="bg-indigo-500 hover:bg-indigo-400 w-full py-3 rounded-xl font-semibold text-sm">Select Market</button>
                </div>
            `).join('');
        }

        function selectMarket(id) { document.getElementById('marketId').value = id; }
        
        async function placeBet(isYes) {
            const id = document.getElementById('marketId').value;
            if (!id) return alert("Please select a market first!");
            if (!window.ethereum || !window.ethereum.selectedAddress) return alert("Please connect wallet first!");

            try {
                const provider = new ethers.providers.Web3Provider(window.ethereum);
                const signer = provider.getSigner();
                const contract = new ethers.Contract(contractAddress, ["function bet(uint256 _marketId, bool _prediction) external payable"], signer);

                alert("Please confirm the transaction in your MetaMask...");
                const tx = await contract.bet(id, isYes, { value: ethers.utils.parseEther("0.01") });
                
                alert("Transaction sent! Waiting for confirmation...");
                await tx.wait(); // ট্রানজেকশন নিশ্চিত হওয়ার জন্য অপেক্ষা করবে
                
                alert("Success! Your bet has been confirmed on the blockchain.");
            } catch (err) {
                console.error(err);
                alert("Transaction failed: " + (err.message || "User denied"));
            }
        }

        window.onload = loadMarkets;
    </script>
</body>
</html>
</body>
</html>
