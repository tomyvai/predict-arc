<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Arc | Modern Prediction Market</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>
    <style>
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gradient-text { background: linear-gradient(to right, #60a5fa, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen font-sans p-4">

    <header class="p-8 text-center">
        <h1 class="text-5xl font-extrabold gradient-text">Prediction Arc</h1>
        <p class="text-slate-400 mt-2 text-lg">Decentralized Prediction Market</p>
    </header>

    <main class="max-w-xl mx-auto">
        <!-- Create New Market Form -->
        <div class="glass-card rounded-3xl p-8 shadow-2xl mb-8">
            <h2 class="text-xl font-bold mb-4 text-slate-200">Create New Market</h2>
            <input type="text" id="newQuestion" placeholder="Enter your question here..." 
                class="w-full p-4 rounded-xl bg-slate-900 border border-slate-700 mb-4 outline-none focus:ring-2 focus:ring-blue-500">
            <button onclick="createNewMarket()" 
                class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-bold transition">
                Create Market
            </button>
        </div>

        <!-- Betting Card -->
        <div class="glass-card rounded-3xl p-8 shadow-2xl mb-8">
            <div class="mb-6">
                <label class="block text-sm font-semibold text-slate-300 mb-2">Market ID</label>
                <input type="number" id="marketId" placeholder="e.g., 0" 
                    class="w-full p-4 rounded-xl bg-slate-900 border border-slate-700 focus:ring-2 focus:ring-blue-500 outline-none transition">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <button onclick="placeBet(true)" class="bg-emerald-600 hover:bg-emerald-500 py-4 rounded-xl font-bold transition transform active:scale-95 shadow-lg shadow-emerald-900/20">YES</button>
                <button onclick="placeBet(false)" class="bg-rose-600 hover:bg-rose-500 py-4 rounded-xl font-bold transition transform active:scale-95 shadow-lg shadow-rose-900/20">NO</button>
            </div>
            <p id="status" class="mt-6 text-center text-sm text-blue-300 font-medium"></p>
        </div>

        <!-- Market List -->
        <div id="marketContainer" class="space-y-4">
            <h2 class="text-xl font-bold text-slate-300 mb-4">Active Markets</h2>
        </div>
    </main>

    <script>
        const contractAddress = "0xa144672B1DFc3348F0D938DE6496C031a5bcCA3D";
        const abi = [{"inputs":[],"stateMutability":"nonpayable","type":"constructor"},{"inputs":[{"internalType":"uint256","name":"_marketId","type":"uint256"},{"internalType":"bool","name":"_prediction","type":"bool"}],"name":"bet","outputs":[],"stateMutability":"payable","type":"function"},{"inputs":[{"internalType":"uint256","name":"_marketId","type":"uint256"}],"name":"claimWinnings","outputs":[],"stateMutability":"nonpayable","type":"function"},{"inputs":[{"internalType":"string","name":"_question","type":"string"}],"name":"createMarket","outputs":[],"stateMutability":"nonpayable","type":"function"},{"inputs":[{"internalType":"uint256","name":"","type":"uint256"}],"name":"markets","outputs":[{"internalType":"string","name":"question","type":"string"},{"internalType":"bool","name":"resolved","type":"bool"},{"internalType":"bool","name":"outcome","type":"bool"},{"internalType":"uint256","name":"totalYes","type":"uint256"},{"internalType":"uint256","name":"totalNo","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"owner","outputs":[{"internalType":"address","name":"","type":"address"}],"stateMutability":"view","type":"function"},{"inputs":[{"internalType":"uint256","name":"_marketId","type":"uint256"},{"internalType":"bool","name":"_outcome","type":"bool"}],"name":"resolveMarket","outputs":[],"stateMutability":"nonpayable","type":"function"}];

        // Function to create new market
        async function createNewMarket() {
            const question = document.getElementById('newQuestion').value;
            if (!question) return alert("Please enter a question!");
            const statusEl = document.getElementById('status');
            try {
                const provider = new ethers.providers.Web3Provider(window.ethereum);
                const signer = provider.getSigner();
                const contract = new ethers.Contract(contractAddress, abi, signer);
                statusEl.innerText = "Creating market... Check your MetaMask.";
                const tx = await contract.createMarket(question);
                await tx.wait();
                statusEl.innerText = "Market created successfully!";
                location.reload();
            } catch (error) {
                statusEl.innerText = "Error: " + error.message;
            }
        }

        async function placeBet(isYes) {
            const statusEl = document.getElementById('status');
            try {
                if (!window.ethereum) return alert("Please install MetaMask!");
                const provider = new ethers.providers.Web3Provider(window.ethereum);
                await provider.send("eth_requestAccounts", []);
                const signer = provider.getSigner();
                const contract = new ethers.Contract(contractAddress, abi, signer);
                const mId = document.getElementById('marketId').value;
                statusEl.innerText = "Confirm transaction in MetaMask...";
                const tx = await contract.bet(mId, isYes, { value: ethers.utils.parseEther("0.01") });
                statusEl.innerText = "Betting... Please wait.";
                await tx.wait();
                statusEl.innerText = "Success! Your bet has been placed.";
            } catch (error) {
                statusEl.innerText = "Error: " + error.message;
            }
        }

        async function loadMarkets() {
            const container = document.getElementById('marketContainer');
            const provider = ethers.getDefaultProvider("homestead");
            const contract = new ethers.Contract(contractAddress, abi, provider);
            for (let i = 1; i <= 4; i++) {
                try {
                    const market = await contract.markets(i);
                    if (market.question) {
                        const div = document.createElement('div');
                        div.className = "glass-card p-5 rounded-xl border border-slate-700 flex justify-between items-center";
                        div.innerHTML = `
                            <div>
                                <p class="font-bold text-white">ID #${i}: ${market.question}</p>
                                <p class="text-xs text-slate-400">Yes: ${market.totalYes.toString()} | No: ${market.totalNo.toString()}</p>
                            </div>
                            <button onclick="document.getElementById('marketId').value = ${i}" 
                                class="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-lg text-sm transition">Select</button>
                        `;
                        container.appendChild(div);
                    }
                } catch (e) { break; }
            }
        }
        window.onload = loadMarkets;
    </script>
</body>
</html>
