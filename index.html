<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Futura Prediction Market</title>
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0d1117; color: #e6edf3; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        
        /* Header */
        .header { background: #161b22; padding: 20px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #30363d; margin-bottom: 25px; }
        .logo { font-size: 24px; font-weight: bold; color: #58a6ff; }
        
        /* Market Grid */
        .market-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; }
        .market-card { background: #161b22; padding: 20px; border-radius: 12px; border: 1px solid #30363d; transition: 0.3s; }
        .market-card:hover { border-color: #58a6ff; }
        
        /* Inputs & Buttons */
        input { background: #0d1117; border: 1px solid #30363d; color: white; padding: 12px; width: 100%; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        button { padding: 12px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; flex: 1; transition: 0.3s; }
        .btn-yes { background: #1f883d; color: white; }
        .btn-no { background: #cf222e; color: white; }
        .btn-create { background: #58a6ff; color: white; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo">Futura Markets</div>
        <button onclick="connectWallet()" style="background: #238636; color: white;">Connect Wallet</button>
    </div>

    <!-- Create Market -->
    <div class="market-card" style="margin-bottom: 25px;">
        <h3>Create New Market</h3>
        <input type="text" id="question" placeholder="Market Question...">
        <button class="btn-create" onclick="createMarket()">Create Market</button>
    </div>

    <!-- Active Markets -->
    <div class="market-grid">
        <div class="market-card">
            <h3>US Fed interest rates in Q3 2024?</h3>
            <p style="color: #8b949e;">Market ID: 0 | Total Volume: ETH</p>
            <div class="btn-group">
                <button class="btn-yes" onclick="bet(0, true)">YES</button>
                <button class="btn-no" onclick="bet(0, false)">NO</button>
            </div>
        </div>
        <div class="market-card">
            <h3>Place your custom bet</h3>
            <input type="number" id="mId" placeholder="Market ID">
            <input type="number" id="amount" placeholder="Amount in ETH">
            <div class="btn-group">
                <button class="btn-yes" onclick="betFromInput(true)">YES</button>
                <button class="btn-no" onclick="betFromInput(false)">NO</button>
            </div>
        </div>
    </div>
</div>

<script>
    const contractAddress = "0x459b226eE3192603260c9c94d78F5173BA040f2c";
    const abi = [{"inputs":[],"stateMutability":"nonpayable","type":"constructor"},{"inputs":[{"internalType":"uint256","name":"_marketId","type":"uint256"},{"internalType":"bool","name":"_prediction","type":"bool"}],"name":"bet","outputs":[],"stateMutability":"payable","type":"function"},{"inputs":[{"internalType":"uint256","name":"_marketId","type":"uint256"}],"name":"claimWinnings","outputs":[],"stateMutability":"nonpayable","type":"function"},{"inputs":[{"internalType":"string","name":"_question","type":"string"}],"name":"createMarket","outputs":[],"stateMutability":"nonpayable","type":"function"},{"inputs":[{"internalType":"uint256","name":"","type":"uint256"}],"name":"markets","outputs":[{"internalType":"string","name":"question","type":"string"},{"internalType":"bool","name":"resolved","type":"bool"},{"internalType":"bool","name":"outcome","type":"bool"},{"internalType":"uint256","name":"totalYes","type":"uint256"},{"internalType":"uint256","name":"totalNo","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"owner","outputs":[{"internalType":"address","name":"","type":"address"}],"stateMutability":"view","type":"function"},{"inputs":[{"internalType":"uint256","name":"_marketId","type":"uint256"},{"internalType":"bool","name":"_outcome","type":"bool"}],"name":"resolveMarket","outputs":[],"stateMutability":"nonpayable","type":"function"}];

    let signer;

    async function connectWallet() {
        const provider = new ethers.providers.Web3Provider(window.ethereum);
        await provider.send("eth_requestAccounts", []);
        signer = provider.getSigner();
        alert("Wallet Connected Successfully!");
    }

    async function createMarket() {
        if (!signer) return alert("Connect Wallet!");
        const contract = new ethers.Contract(contractAddress, abi, signer);
        await contract.createMarket(document.getElementById('question').value);
    }

    async function bet(id, pred) {
        if (!signer) return alert("Connect Wallet!");
        const contract = new ethers.Contract(contractAddress, abi, signer);
        await contract.bet(id, pred, { value: ethers.utils.parseEther("0.01") });
    }

    async function betFromInput(pred) {
        if (!signer) return alert("Connect Wallet!");
        const contract = new ethers.Contract(contractAddress, abi, signer);
        const id = document.getElementById('mId').value;
        const amount = document.getElementById('amount').value;
        await contract.bet(id, pred, { value: ethers.utils.parseEther(amount) });
    }
</script>
</body>
</html>
