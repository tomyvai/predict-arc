<!DOCTYPE html>
<html>
<head>
    <title>Prediction Market DApp</title>
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>
</head>
<body>
    <h1>Prediction Market</h1>
    
    <!-- মার্কেট তৈরি -->
    <input type="text" id="question" placeholder="প্রশ্ন লিখুন">
    <button onclick="createMarket()">Market তৈরি করুন</button>

    <hr>

    <!-- বাজি ধরা -->
    <input type="number" id="marketId" placeholder="Market ID">
    <input type="number" id="betAmount" placeholder="ETH পরিমাণ">
    <button onclick="bet(true)">Yes বাজি</button>
    <button onclick="bet(false)">No বাজি</button>

    <script>
        const contractAddress = "0x459b226eE3192603260c9c94d78F5173BA040f2c";
        const abi = [const contractAddress = "0x459b226eE3192603260c9c94d78F5173BA040f2c";

const abi = [
	{
		"inputs": [],
		"stateMutability": "nonpayable",
		"type": "constructor"
	},
	{
		"inputs": [
			{ "internalType": "uint256", "name": "_marketId", "type": "uint256" },
			{ "internalType": "bool", "name": "_prediction", "type": "bool" }
		],
		"name": "bet",
		"outputs": [],
		"stateMutability": "payable",
		"type": "function"
	},
	{
		"inputs": [
			{ "internalType": "uint256", "name": "_marketId", "type": "uint256" }
		],
		"name": "claimWinnings",
		"outputs": [],
		"stateMutability": "nonpayable",
		"type": "function"
	},
	{
		"inputs": [
			{ "internalType": "string", "name": "_question", "type": "string" }
		],
		"name": "createMarket",
		"outputs": [],
		"stateMutability": "nonpayable",
		"type": "function"
	},
	{
		"inputs": [
			{ "internalType": "uint256", "name": "", "type": "uint256" }
		],
		"name": "markets",
		"outputs": [
			{ "internalType": "string", "name": "question", "type": "string" },
			{ "internalType": "bool", "name": "resolved", "type": "bool" },
			{ "internalType": "bool", "name": "outcome", "type": "bool" },
			{ "internalType": "uint256", "name": "totalYes", "type": "uint256" },
			{ "internalType": "uint256", "name": "totalNo", "type": "uint256" }
		],
		"stateMutability": "view",
		"type": "function"
	},
	{
		"inputs": [],
		"name": "owner",
		"outputs": [
			{ "internalType": "address", "name": "", "type": "address" }
		],
		"stateMutability": "view",
		"type": "function"
	},
	{
		"inputs": [
			{ "internalType": "uint256", "name": "_marketId", "type": "uint256" },
			{ "internalType": "bool", "name": "_outcome", "type": "bool" }
		],
		"name": "resolveMarket",
		"outputs": [],
		"stateMutability": "nonpayable",
		"type": "function"
	}
];
        
        async function connect() {
            const provider = new ethers.providers.Web3Provider(window.ethereum);
            await provider.send("eth_requestAccounts", []);
            return provider.getSigner();
        }

        async function createMarket() {
            const signer = await connect();
            const contract = new ethers.Contract(contractAddress, abi, signer);
            const question = document.getElementById("question").value;
            await contract.createMarket(question);
        }

        async function bet(prediction) {
            const signer = await connect();
            const contract = new ethers.Contract(contractAddress, abi, signer);
            const id = document.getElementById("marketId").value;
            const amount = document.getElementById("betAmount").value;
            
            await contract.bet(id, prediction, {
                value: ethers.utils.parseEther(amount)
            });
        }
    </script>
</body>
</html>
