<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predict.arc | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- ethers v5.7.2 লোড করার জন্য এটি সবচেয়ে নিশ্চিত লিঙ্ক -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { background: #0f172a; color: white; }
        .glass { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="p-8">
    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold">Predict.arc</h1>
            <button id="connectBtn" onclick="connectWallet()" class="bg-indigo-600 px-6 py-2 rounded-full font-semibold">Connect Wallet</button>
        </header>

        <div id="questionContainer" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
            <p class="text-slate-400">Loading markets...</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="glass p-6 rounded-xl">
                <h2 class="font-bold mb-4">Place Bet</h2>
                <input id="marketId" type="number" placeholder="Enter Market ID" class="w-full p-2 bg-slate-900 rounded mb-2 border border-slate-700">
                <div class="flex gap-2">
                    <button onclick="placeBet(true)" class="bg-emerald-600 px-4 py-2 rounded w-full font-bold">YES</button>
                    <button onclick="placeBet(false)" class="bg-rose-600 px-4 py-2 rounded w-full font-bold">NO</button>
                </div>
            </div>

            <div class="glass p-6 rounded-xl">
                <h2 class="font-bold mb-4">Create Market</h2>
                <input id="newQuestion" type="text" placeholder="Enter question" class="w-full p-2 bg-slate-900 rounded mb-2 border border-slate-700">
                <button onclick="createMarket()" class="w-full bg-blue-600 py-3 rounded-xl font-bold">Create Market</button>
            </div>
        </div>
    </div>

    <script>
        const contractAddress = "0x459b226eE3192603260c9c94d78F5173BA040f2c";
        const abi = [
            "function bet(uint256 _marketId, bool _prediction) public payable",
            "function createMarket(string memory _question) public",
            "function getMarketCount() public view returns (uint256)",
            "function markets(uint256) public view returns (string question, bool resolved, bool outcome, uint256 totalYes, uint256 totalNo)"
        ];

        // ethers লোড হয়েছে কি না চেক করা
        function checkEthers() {
            if (typeof ethers === 'undefined') {
                console.error("Ethers.js is not loaded yet!");
                setTimeout(checkEthers, 500); // ৫০ মিলি সেকেন্ড পরে আবার চেক করবে
                return false;
            }
            return true;
        }

        async function connectWallet() {
            if (window.ethereum) {
                await window.ethereum.request({ method: 'eth_requestAccounts' });
                document.getElementById('connectBtn').innerText = "Connected";
                loadQuestions();
            } else { alert("Please install MetaMask!"); }
        }

        async function loadQuestions() {
            if (!checkEthers() || !window.ethereum) return;
            try {
                const provider = new ethers.providers.Web3Provider(window.ethereum);
                const contract = new ethers.Contract(contractAddress, abi, provider);
                const count = await contract.getMarketCount();
                const container = document.getElementById('questionContainer');
                container.innerHTML = "";
                
                for(let i = 0; i < count; i++) {
                    const data = await contract.markets(i);
                    container.innerHTML += `
                        <div class="glass p-4 rounded-lg">
                            <p class="text-xs text-indigo-400 font-bold">ID: ${i}</p>
                            <p class="font-semibold mt-1">${data.question}</p>
                        </div>`;
                }
            } catch(e) { console.error("Error loading:", e); }
        }

        async function placeBet(isYes) {
            const id = document.getElementById('marketId').value;
            const provider = new ethers.providers.Web3Provider(window.ethereum);
            const signer = provider.getSigner();
            const contract = new ethers.Contract(contractAddress, abi, signer);
            try {
                const tx = await contract.bet(id, isYes, { value: ethers.utils.parseEther("0.001") });
                await tx.wait();
                alert("Bet Successful!");
                loadQuestions();
            } catch(e) { alert("Error: " + e.message); }
        }

        async function createMarket() {
            const question = document.getElementById('newQuestion').value;
            if(!question) return alert("Write a question first!");
            const provider = new ethers.providers.Web3Provider(window.ethereum);
            const signer = provider.getSigner();
            const contract = new ethers.Contract(contractAddress, abi, signer);
            try {
                const tx = await contract.createMarket(question);
                await tx.wait();
                alert("Market Created!");
                loadQuestions();
            } catch(e) { alert("Error: " + e.message); }
        }

        window.onload = loadQuestions;
    </script>
</body>
</html>
