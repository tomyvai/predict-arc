<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Futura Prediction Market</title>
    <!-- Ethers.js লাইব্রেরি -->
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>
    
    <style>
        /* Dark Theme CSS */
        body { font-family: 'Segoe UI', sans-serif; background-color: #0d1117; color: #e6edf3; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px; background: #161b22; border-radius: 12px; margin-bottom: 20px; }
        .market-card { background: #161b22; padding: 20px; border-radius: 12px; border: 1px solid #30363d; margin-bottom: 20px; }
        
        input { background: #0d1117; border: 1px solid #30363d; color: white; padding: 12px; width: 100%; border-radius: 8px; margin: 10px 0; box-sizing: border-box; }
        button { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        
        .btn-connect { background: #238636; color: white; }
        .btn-create { background: #58a6ff; color: white; width: 100%; }
        .btn-yes { background: #1f883d; color: white; flex: 1; }
        .btn-no { background: #cf222e; color: white; flex: 1; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>Futura Markets</h2>
        <button class="btn-connect" onclick="connectWallet()">Connect Wallet</button>
    </div>

    <!-- মার্কেট তৈরির কার্ড -->
    <div class="market-card">
        <h3>Create New Market</h3>
        <input type="text" id="question" placeholder="প্রশ্ন লিখুন...">
        <button class="btn-create" onclick="createMarket()">Create Market</button>
    </div>

    <!-- বাজি ধরার কার্ড -->
    <div class="market-card">
        <h3>Place Your Bet</h3>
        <input type="number" id="mId" placeholder="Market ID">
        <input type="number" id="amount" placeholder="ETH পরিমাণ (যেমন: 0.01)">
        <div class="btn-group">
            <button class="btn-yes" onclick="bet(true)">YES</button>
            <button class="btn-no" onclick="bet(false)">NO</button>
        </div>
    </div>
</div>

<script>
    const contractAddress = "0x459b226eE3192603260c9c94d78F5173BA040f2c";
    const abi = [
        {"inputs":[],"stateMutability":"nonpayable","type":"constructor"},
        {"inputs":[{"internalType":"uint256","name":"_marketId","type":"uint256"},{"internalType":"bool","name":"_prediction","type":"bool"}],"name":"bet","outputs":[],"stateMutability":"payable","type":"function"},
        {"inputs":[{"internalType":"uint256","name":"_marketId","type":"uint256"}],"name":"claimWinnings","outputs":[],"stateMutability":"nonpayable","type":"function"},
        {"inputs":[{"internalType":"string","name":"_question","type":"string"}],"name":"createMarket","outputs":[],"stateMutability":"nonpayable","type":"function"},
        {"inputs":[{"internalType":"uint256","name":"","type":"uint256"}],"name":"markets","outputs":[{"internalType":"string","name":"question","type":"string"},{"internalType":"bool","name":"resolved","type":"bool"},{"internalType":"bool","name":"outcome","type":"bool"},{"internalType":"uint256","name":"totalYes","type":"uint256"},{"internalType":"uint256","name":"totalNo","type":"uint256"}],"stateMutability":"view","type":"function"},
        {"inputs":[],"name":"owner","outputs":[{"internalType":"address","name":"","type":"address"}],"stateMutability":"view","type":"function"},
        {"inputs":[{"internalType":"uint256","name":"_marketId","type":"uint256"},{"internalType":"bool","name":"_outcome","type":"bool"}],"name":"resolveMarket","outputs":[],"stateMutability":"nonpayable","type":"function"}
    ];

    let signer;

    async function connectWallet() {
        if (!window.ethereum) return alert("MetaMask ইনস্টল করুন!");
        const provider = new ethers.providers.Web3Provider(window.ethereum);
        await provider.send("eth_requestAccounts", []);
        signer = provider.getSigner();
        alert("Wallet Connected!");
    }

    async function createMarket() {
        if (!signer) return alert("Wallet কানেক্ট করুন!");
        const contract = new ethers.Contract(contractAddress, abi, signer);
        const q = document.getElementById('question').value;
        await contract.createMarket(q);
    }

    async function bet(prediction) {
        if (!signer) return alert("Wallet কানেক্ট করুন!");
        const contract = new ethers.Contract(contractAddress, abi, signer);
        const id = document.getElementById('mId').value;
        const amount = document.getElementById('amount').value;
        
        await contract.bet(id, prediction, { 
            value: ethers.utils.parseEther(amount) 
        });
    }
</script>

</body>
</html>
